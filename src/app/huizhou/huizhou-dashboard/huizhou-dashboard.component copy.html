<div fxLayout="column" fxLayoutGap="10px"
    [style.margin-left]="'10px'" >
    <div fxFlex="1 1 33%"
        fxLayout="row wrap"
        fxLayout.lt-sm="column"
        fxLayoutGap="10px"
        fxLayoutAlign="flex-start" >
        <ng-container *ngFor="let item of cards" >
            <app-card-view background="{{item.cardBackground}}"
            fxFlex="0 1 calc(25%-10px)"
            fxFlex.lt-md="0 1 calc(50%-10px)"
            fxFlex.lt-sm="100%">{{item.cardTitle}}</app-card-view>
            <!-- <mat-card
                flFlex="0 1 calc( 25%- 10px)"
                fxFlex.lt-md="0 1 calc(50% - 10px)"
                fxFlex.lt-sm="100%"
            >{{item}}</mat-card> -->
        </ng-container>

    </div>
    <div fxFlex="1 1 34%" fxFlexFill
        style="background-color: antiquewhite;">
        <ng-container >
            <div fxFlex="50%"  style="background-color: aqua;">
                <mat-card class="child-1">1. One</mat-card> 
            </div>
        </ng-container>
