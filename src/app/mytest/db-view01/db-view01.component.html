<div class="top-div" fxLayout="column" >
  <div class="header-div">조회조건</div>
  <form class="input-form" fxLayoutAlign="start center" fxLayoutGap = "20px"
      [formGroup]="form" 
      (ngSubmit)="onSubmit()">
    <mat-form-field fxFlex="10" appearance="outline" hideRequiredMarker="false" >
      <mat-label>해당월</mat-label>
      <input matInput formControlName="yymm" required>
    </mat-form-field>
    <mat-form-field fxFlex="10" appearance="outline" >
      <mat-label>Plant</mat-label>
      <input matInput formControlName="plant" required>
    </mat-form-field> 

    <mat-form-field fxFlex="40" appearance="outline" hideRequiredMarker="false" >
      <mat-label>공정1</mat-label>
      <input matInput formControlName="procs" >
    </mat-form-field>
  
    <button fxFlex="none" mat-flat-button color="primary">Search</button> 
  </form>
</div>
<p></p>
<table mat-table
       [dataSource]="dataSource" class="mat-elevation-z8">
  <ng-container [matColumnDef]="column" *ngFor="let column of displayedColumns; let i = index">
    <th mat-header-cell *matHeaderCellDef>{{ displayedColumns2[i] }}</th>
    <td mat-cell *matCellDef="let data">{{ data[column] }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
<mat-paginator #paginator [pageSizeOptions]="[10]" showFirstLastButtons></mat-paginator>

<mat-progress-spinner [mode]="'indeterminate'" *ngIf="loading$ | async"></mat-progress-spinner>
